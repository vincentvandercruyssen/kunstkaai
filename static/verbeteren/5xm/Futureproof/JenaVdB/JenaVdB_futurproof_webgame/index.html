<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SOIL Prototype</title>
     <link rel="stylesheet" href="style.css"> 
    </head> 
    <body> 
      <!-- GAME WORLD --> 
       <div class="game-world">
        
        <!-- SKY -->
          <div class="sky">

          </div> 
          
          <!-- CITY BACKGROUND -->
            <div class="city"></div>
             <!-- BUILDING -->
              
             <div class="building">
               <!-- SNAP WINDOWS --> 
                
               <div class="slot"
                data-filled="false">
              </div> 
              
              <div class="slot" data-filled="false"></div> 
              <div class="slot" data-filled="false"></div>
               <div class="slot" data-filled="false"></div>

               
               </div> <!-- INVENTORY --> <div class="inventory">
                 <div class="panel" draggable="true"></div>
                  <div class="panel" draggable="true"></div>
                   <div class="panel" draggable="true"></div>
                    <div class="panel" draggable="true"></div> </div> 
                    
                    <!-- PROGRESS UI --> 
                     <div class="ui">
                       <h2>City Restoration</h2>
                       
                       <div class="progress-bar"> <div class="progress-fill"></div>
                       </div> <p class="progress-text">0%</p> </div> </div>
                       
                       <script src="app.js"></script> 
                      </body> 
                      </html>
