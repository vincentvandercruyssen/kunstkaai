<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<h1>Mijn Kanban Board</h1>

<div class="add-box">
    <textarea id="noteText" placeholder="Nieuwe notitie..."></textarea><br>
    <button class="add-btn" onclick="addNote()">Voeg toe</button>
</div>

<div class="board">
    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>To Do</h2>
    </div>

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>Doing</h2>
    </div>

    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
        <h2>Done</h2>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
