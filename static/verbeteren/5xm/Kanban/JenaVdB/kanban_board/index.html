<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Kanban Bord</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<main>
  <h1>Kanban Bord</h1>

  <div class="bediening">
    <input id="kaartTekst" placeholder="Nieuw kaartje toevoegen">
    <button id="voegKaartToe">Toevoegen</button>
  </div>

  <div class="kanban-bord">

    <div class="kolom">
      <h2>Te doen</h2>
      <div id="todo" class="lijst"></div>
    </div>

    <div class="kolom">
      <h2>Bezig</h2>
      <div class="lijst"></div>
    </div>

    <div class="kolom">
      <h2>Klaar</h2>
      <div class="lijst"></div>
    </div>

  </div>
</main>

<script src="app.js"></script>
</body>
</html>
