<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
  <main>
    <h1>Kanban bord</h1>

    <div class="bediening">
      <input id="kaartTekst" placeholder="Nieuw kaartje toevoegen">
      <button id="voegKaartToe">Toevoegen</button>
    </div>

    <section class="kanban-bord">
      <article class="kolom">
        <h2>Te doen</h2>
        <div id="todo" class="lijst"></div>
      </article>

      <article class="kolom">
        <h2>Bezig</h2>
        <div id="bezig" class="lijst"></div>
      </article>

      <article class="kolom">
        <h2>Klaar</h2>
        <div id="klaar" class="lijst"></div>
      </article>
    </section>
  </main>

  <div id="popupVerwijder" class="popup hidden">
    <div class="popup-box">
      <p>Dit kaartje verwijderen?</p>
      <div class="popup-buttons">
        <button id="popupJa">Verwijderen</button>
        <button id="popupNee">Annuleren</button>
      </div>
    </div>
  </div>

  <div id="popupEdit" class="popup hidden">
    <div class="popup-box">
      <p>Kaartje bewerken</p>
      <input id="editInput" type="text">
      <div class="popup-buttons">
        <button id="editOpslaan">Opslaan</button>
        <button id="editAnnuleren">Annuleren</button>
      </div>
    </div>
  </div>
</body>
</html>
