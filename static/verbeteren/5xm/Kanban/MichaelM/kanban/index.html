<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bediening">
  <input id="kaartTekst" placeholder="Nieuw kaartje toevoegen" />
  <button id="voegKaartToe">Toevoegen</button>
</div>

   
    <div id="progressContainer" class="progress-container" aria-hidden="false">
      <div class="progress-label">Voortgang: <span id="progressPercent">0%</span></div>
      <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
      </div>
    </div>

    <main class="kanban-bord" role="main">
      <h1>Kanban</h1>

      <div class="kolom">
        <h2>Te doen <span class="teller" id="todoCount">0</span></h2>
        <div id="todo" class="lijst" aria-label="Te doen lijst" role="list"></div>
      </div>

      <div class="kolom">
        <h2>Bezig <span class="teller" id="bezigCount">0</span></h2>
        <div id="bezig" class="lijst" aria-label="Bezig lijst" role="list"></div>
      </div>

      <div class="kolom">
        <h2>Klaar <span class="teller" id="klaarCount">0</span></h2>
        <div id="klaar" class="lijst" aria-label="Klaar lijst" role="list"></div>
      </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
