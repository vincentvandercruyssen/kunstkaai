<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Bord</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main>
  <h1>Mijn Kanban Bord</h1>

  <div class="bediening">
    <input type="text" id="kaartTekst" placeholder="Nieuw kaartje toevoegen" />
    <button id="voegKaartToe">Toevoegen</button>
  </div>

  <div class="kanban-bord">
    
    <section class="kolom">
      <h2>
        Te Doen <span class="taak-aantal">0</span>
      </h2>
      <div id="todo" class="lijst"></div>
    </section>

    <section class="kolom">
      <h2>
        Bezig <span class="taak-aantal">0</span>
      </h2>
      <div id="bezig" class="lijst"></div>
    </section>

    <section class="kolom">
      <h2>
        Klaar <span class="taak-aantal">0</span>
      </h2>
      <div id="klaar" class="lijst"></div>
    </section>

  </div>
</main>

<div class="achtergrond-knop-container">
  <button id="wisselAchtergrond">Verander achtergrond</button>
</div>

<script src="app.js"></script>
</body>
</html>
