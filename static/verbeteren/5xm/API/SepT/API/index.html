<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landen Zoeker API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Landen Zoeker</h1>
        <p>Typ een land in (bijv. France, Japan, Brazil):</p>

        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Zoek een land...">
            <button id="searchBtn">Zoeken</button>
        </div>

        <div id="result"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
