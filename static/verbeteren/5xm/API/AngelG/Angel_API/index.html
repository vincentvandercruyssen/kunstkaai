<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Movie Finder 🎬</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
  <h1>🎬 Movie Finder</h1>
  <p>Zoek films of ontdek aanbevolen titels</p>

  <div class="controls">

    <button id="aanbevolenBtn">Aanbevolen 🎥</button>
  </div>

  <div id="resultaat"></div>
</main>

<script src="app.js"></script>
</body>
</html>
