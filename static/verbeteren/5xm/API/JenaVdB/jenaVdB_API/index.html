<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Landen API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Landen Zoeker 🌍</h1>
    <p>Zoek info over landen via een API</p>
</header>

<main>
    <input type="text" id="zoekveld" placeholder="Typ een land...">
    <button id="zoekknop">Zoeken</button>
    <button id="randomknop">Willekeurig land</button>

    <p id="counter">Gevonden landen: 0 / 250</p>
    <div id="resultaat"></div>
</main>

<script src="app.js"></script>
</body>
</html>
