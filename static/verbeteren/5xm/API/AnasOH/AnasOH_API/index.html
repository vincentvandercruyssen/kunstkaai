<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>Wikipedia Zoeker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Wikipedia Zoeker</h1>
      <p>Zoek naar Wikipedia-artikels via een API</p>
    </header>

    <main>
      <input type="text" id="zoekveld" placeholder="Zoek een onderwerp..." />
      <button id="zoekknop">Zoeken</button>

      <button id="randomBtn">Willekeurig artikel</button>

      <div id="resultaat"></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
