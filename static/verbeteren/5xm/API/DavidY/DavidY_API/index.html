<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Weer App</h1>
        <p>Zoek het huidige weer van een stad via een API.</p>

        <div class="zoek-container">
            <input type="text" id="zoekveld" placeholder="Typ een stad...">
            <div class="knoppen-wrap">
                <button id="zoekknop">Zoek weer</button>
                <button id="randomknop">Willekeurige plaats</button>
            </div>
        </div>

        <div id="resultaat"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
