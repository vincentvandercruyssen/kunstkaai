<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>BookFinder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📚 BookFinder</h1>
    <p>Zoek boeken via Open Library</p>
</header>

<main>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Zoek een boek...">
        <button id="searchBtn">Zoeken</button>
        <button id="limitBtn">Toon 5 resultaten</button>
        <button id="sortBtn">Sorteer op jaartal</button>
        <button id="randomBtn">Random boek</button>
    </div>

    <div id="status"></div>
    <div id="results" class="cards"></div>

</main>

<script src="script.js"></script>
</body>
</html>
