<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservatie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
<h1>Reservatie</h1>
<h2>Welkom bij de restaurant,hier kan je reserveren.</h2>
<form action="https://formspree.io/f/mbddovkj" method="post">

<label for="naam">Naam:</label>
<input type="text" name="naam" id="naam" required>

<label for="email">Email:</label>
<input type="email" name="email" id="email" required>

<label for="datum">Datum:</label>
<input type="date" name="date" id="date" required>

<label for="Tijd">Tijd:</label>
<input type="time" name="time" id="time" required>

<label for="telefoon">Telefoon:</label>
<input type="tel" name="telefoon" id="telefoon" required>

<label for="bericht">Bericht:</label>
<textarea name="bericht" id="bericht" required></textarea>

<button type="submit">Verzenden</button>
<button type="reset">Reset</button>
</form>
</main>
</body>
</html>
