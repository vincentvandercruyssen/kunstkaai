<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservatie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Reservatie</h1>
        <h2>Hier kun je reserveren!</h2>
        <form action="https://formspree.io/f/xkojwngb" method="post">
            <label for="naam">Voornaam:</label>
            <input type="text" id="naam" name="naam" required>
            
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required>

            <label for="datum">Datum:</label>
            <input type="date" name="datum" id="datum" required>

            <label for="tijd">Tijd:</label>
            <input type="time" name="tijd" id="tijd" required>

            <label for="telefoon">Telefoonnummer:</label>
            <input type="tel" name="telefoon" id="telefoon">

            <label for="bericht">Bericht:</label>
            <textarea name="bericht" id="bericht">Beste</textarea>
            <button type="submit">verzenden</button> <button type="reset">reset</button>
        </form>
    </main>
</body>
</html>
