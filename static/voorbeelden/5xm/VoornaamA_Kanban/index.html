<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban-bord</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main>
      <h1>Kanban</h1>

      <div class="bediening">
        <input type="text" id="kaartTekst" placeholder="Nieuw kaartje toevoegen" />
        <button id="voegKaartToe">Toevoegen</button>
      </div>

      <section class="kanban-bord">
        <div class="kolom">
          <h2>Te doen</h2>
          <div class="lijst" id="todo"></div>
        </div>

        <div class="kolom">
          <h2>Bezig</h2>
          <div class="lijst"></div>
        </div>

        <div class="kolom">
          <h2>Klaar</h2>
          <div class="lijst"></div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
