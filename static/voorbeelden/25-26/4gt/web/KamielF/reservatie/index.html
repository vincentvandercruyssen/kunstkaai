<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservatie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
    <h1>Reservatie</h1>
    <h2>Welkom hier kan je reserveren.</h2>
    <form action="https://formspree.io/f/mykkever"method="post">
    <label for="naam">Voornaam*:</label>
    <input type="text" name="Naam" id="Naam" required="true">
    <label for="Naam">Achternaa*:</label>
    <input type="text" name="Naam" id="Naam" required="true">
    <label for="email">Email*:</label>
    <input type="email" name="Email" id="Email" required="true">
    <label for="Pasword">Pasword*:</label>
    <input type="password" name="Pasword" id="Pasword" required="true">
    <label for="date">Date*:</label>
    <input type="date" name="Date" id="Date" required="true">
    <label for="time">Time*:</label>
    <input type="time" name="Time" id="Time" required="true">
    <label for="tel">Tel:</label>
    <input type="tel" name="Tel" id="Tel">
    <label for="bericht">Bericht:</label>
    <textarea name="Bericht" id="Bericht" cols="30" rows="10"></textarea>
    <button type="submit">Verzenden</button>
    <button type="reset">Reset</button>
    <p>(*) Vereist</p>
    </form>
    </main>
</body>
</html>
