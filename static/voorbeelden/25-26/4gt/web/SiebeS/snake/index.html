<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klassieke Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #4caf50;
        }

        #score-board {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        #score {
            color: #4caf50;
            font-weight: bold;
        }

        canvas {
            background-color: #111;
            border: 4px solid #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
            border-radius: 4px;
        }

        .game-over-text {
            color: #f44336;
            font-size: 1.2rem;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <h1>SNAKE</h1>
    <div id="score-board">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="game-over" class="game-over-text">Game Over! Druk op de 'Spatiebalk' om opnieuw te starten.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverElement = document.getElementById("game-over");

        // Grid en game instellingen
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{ x: 10, y: 10 }]; // Startpositie van de slang
        let food = { x: 5, y: 5 };       // Startpositie van het eten
        let dx = 0;                      // Horizontale snelheid (start naar rechts)
        let dy = 0;                      // Verticale snelheid
        let score = 0;
        let gameInterval;
        let gameRunning = true;
        let changingDirection = false;   // Voorkomt dat de slang in zichzelf kan sturen

        // Start het spel
        main();

        function main() {
            if (!gameRunning) return;
            
            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
            checkGameOver();
            
            // Snelheid van de game (elke 100ms een update)
            setTimeout(main, 100);
        }

        // Maak het canvas leeg voor de volgende frame
        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Teken de slang op het canvas
        function drawSnake() {
            ctx.fillStyle = "#4caf50";
            ctx.strokeStyle = "#111";
            
            snake.forEach((part, index) => {
                // Geef de kop een iets andere tint groen
                ctx.fillStyle = index === 0 ? "#81c784" : "#4caf50";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        // Beweeg de slang en check of hij eet
        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            // Check of de kop op dezelfde positie als het eten staat
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                // Verwijder het achterste stukje als er niet gegeten is
                snake.pop();
            }
        }

        // Teken het eten (rode stip)
        function drawFood() {
            ctx.fillStyle = "#f44336";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);
        }

        // Genereer een nieuwe willekeurige locatie voor het eten
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Zorg ervoor dat het eten niet op de slang zelf spawnt
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        // Besturing via de pijltjestoetsen
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            // Toetsenbord codes
            const LEFT = 37;
            const UP = 38;
            const RIGHT = 39;
            const DOWN = 40;
            const SPACE = 32;

            // Herstart de game met spatiebalk als je af bent
            if (keyPressed === SPACE && !gameRunning) {
                resetGame();
                return;
            }

            if (changingDirection) return;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT && !goingRight) {
                dx = -1;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === UP && !goingDown) {
                dx = 0;
                dy = -1;
                changingDirection = true;
            }
            if (keyPressed === RIGHT && !goingLeft) {
                dx = 1;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === DOWN && !goingUp) {
                dx = 0;
                dy = 1;
                changingDirection = true;
            }
        }

        // Check voor botsingen (muren of eigen lichaam)
        function checkGameOver() {
            const head = snake[0];

            // Check muurbotsing
            const hitLeftWall = head.x < 0;
            const hitRightWall = head.x >= tileCount;
            const hitToptWall = head.y < 0;
            const hitBottomWall = head.y >= tileCount;

            if (hitLeftWall || hitRightWall || hitToptWall || hitBottomWall) {
                endGame();
            }

            // Check botsing met eigen lichaam
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                }
            }
        }

        // Beëindig het spel
        function endGame() {
            gameRunning = false;
            gameOverElement.style.display = "block";
        }

        // Reset alle variabelen voor een nieuw spel
        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            food = { x: 5, y: 5 };
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            gameRunning = true;
            gameOverElement.style.display = "none";
            main();
        }
    </script>
</body>
</html>
