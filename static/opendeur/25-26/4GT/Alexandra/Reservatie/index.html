
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservatie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>˚₊‧꒰ა Reservatie ໒꒱ ‧₊˚</h1>
    <section>
    <h2>🍓 ꩜ Maak hier je reservatie: ꩜ 🤍</h2>
    <form action="https://formspree.io/f/xreeqwlz" method="post">
        <label for="naam">Naam:</label>
        <input type="text" name="naam" id="naam" required>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="datum">Datum:</label>
        <input type="date" name="datum" id="datum" required>

        <label for="tijd">Tijd:</label>
        <input type="time" name="tijd" id="tijd" required>

        <label for="delefoon">Telefoonummer:</label>
        <input type="tel" name="telefoon" id="telefoon">

        <label for="bericht">Bericht:</label>
        <textarea name="bericht" id="bericht"></textarea>

        <button type="submit">Verzenden</button>
        <button type="reset">Reset</button>
    </form>
    </section>
</body>
</html>
