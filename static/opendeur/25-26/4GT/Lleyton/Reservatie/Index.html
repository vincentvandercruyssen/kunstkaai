<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservatie - Skibidi Snackbar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="res-header">
            <h1>Reserveer bij Skibidi Snackbar</h1>
            <p>Reserveer eenvoudig je plek en geniet zonder wachten</p>
          </div>
          
        <form action="https://formspree.io/f/xojjvnoj" method="POST">
            
            <label for="naam">Naam *</label>
            <input type="text" id="naam" name="naam" required>
            
            <label for="email">E-mail *</label>
            <input type="email" id="email" name="email" required>
            
            <label for="datum">Datum *</label>
            <input type="date" id="datum" name="datum" required>
            
            <label for="tijd">Tijd *</label>
            <input type="time" id="tijd" name="tijd" required>
            
            <label for="telefoon">Telefoonnummer * </label>
            <input type="tel" id="telefoon" name="telefoon" required>
           
            <label for="bericht">Bericht</label>
            <textarea id="bericht" name="bericht"></textarea>
            
            <button type="submit">Verzenden</button>
        </form>
    </main>
</body>

</html>
