<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservatie</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Reservatie</h1>
        <h2>Hier kan je reserveren</h2>
        <form action="https://formspree.io/f/xlggdprq" method="post">
        <label for="naam">Voornaam:</label>
        <input type="text" id="naam" name="naam" required>
        <label for="e-mail">E-mail:</label>
        <input type="text" id="e-mail" name="e-mail" required>
        <label for="datum">Datum:</label>
        <input type="date" id="datum" name="datum" required>
        <label for="Tijd">Tijd:</label>
        <input type="time" id="tijd" name="tijd" required>
        <label for="Telefoonnummer">Telefoonnummer:</label>
        <input type="text" id="Telefoonnummer" name="Telefoonnummer" required>
        <label for="bericht">Bericht:</label>
        <textarea name="bericht" id="bericht"></textarea>
        <button type="submit">Verzenden</button>
      </form>
    </main>
</body>
</html>
